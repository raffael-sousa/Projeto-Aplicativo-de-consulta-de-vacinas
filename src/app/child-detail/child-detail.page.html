<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Detalhes da Criança</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="selectedChild">
  <h2>{{ selectedChild.name }}</h2>
  <p>{{ selectedChild.age }} anos</p>

  <ion-list>
    <ion-item *ngFor="let vacina of selectedChild.vacinas">
      <ion-label>
       {{ vacina.name }} - {{ vacina.status }}>
      </ion-label>
    </ion-item>
  </ion-list>
  
</ion-content>
