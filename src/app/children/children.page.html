<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Crianças</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-button expand="block">
    Adicionar Criança
  </ion-button>

  <ion-list>
    
    <ion-item button *ngFor="let child of children" [routerLink]="['/child-detail', child.id]">
     <ion-label>
      <h2>{{ child.name }}</h2>
      <p>{{ child.age }} ano(s) - {{ child.status }}</p>
     </ion-label>
    </ion-item>

  </ion-list>

</ion-content>
